<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>王馨慧的请假</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #f6f8fa;
            font-family: -apple-system, "Helvetica Neue", Arial, "PingFang SC", "Microsoft YaHei", sans-serif;
            -webkit-font-smoothing: antialiased;
        }
        /* 复刻审批通过水印图章 */
        .stamp-box {
            position: absolute;
            top: 48px;
            right: 18px;
            z-index: 100;
            pointer-events: none;
        }
        .stamp-circle {
            width: 85px;
            height: 85px;
            border: 2px solid #52c41a;
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transform: rotate(-15deg);
            background: rgba(255, 255, 255, 0.4);
            position: relative;
        }
        /* 内部细圆圈 */
        .stamp-circle::before {
            content: '';
            position: absolute;
            width: 75px;
            height: 75px;
            border: 1px solid #52c41a;
            border-radius: 50%;
        }
        .stamp-text {
            color: #52c41a;
            font-size: 16px;
            font-weight: 900;
            line-height: 1.2;
            letter-spacing: 2px;
        }
        .stamp-stars {
            color: #52c41a;
            font-size: 8px;
            margin-top: 1px;
        }
    </style>
</head>
<body class="pb-12 text-[15px]">

    <div class="bg-[#4a90e2] text-white p-3 flex items-center justify-between sticky top-0 z-50">
        <div class="flex items-center">
            <span class="text-2xl mr-3">〈</span>
            <div class="flex flex-col">
                <span class="text-base font-medium leading-tight">王馨慧的请假</span>
                <span class="text-[10px] opacity-70">app.uyiban.com</span>
            </div>
        </div>
        <div class="flex space-x-1">
            <div class="w-1 h-1 bg-white rounded-full"></div>
            <div class="w-1 h-1 bg-white rounded-full"></div>
            <div class="w-1 h-1 bg-white rounded-full"></div>
        </div>
    </div>

    <div class="relative bg-white border-b">
        <div class="py-5 text-center">
            <h2 class="text-[18px] text-[#333]">王馨慧的请假</h2>
        </div>

        <div class="stamp-box">
            <div class="stamp-circle">
                <div class="stamp-text">审批</div>
                <div class="stamp-text">通过</div>
                <div class="stamp-stars">★★★</div>
            </div>
        </div>

        <div class="bg-[#f2f5f8] px-4 py-2 flex items-center">
            <div class="w-1 h-4 bg-[#4a90e2] mr-2"></div>
            <span class="text-[#666] font-medium text-sm">申请人</span>
        </div>
        <div class="px-4 py-4 flex justify-between items-center border-b">
            <span class="text-[#999]">姓名</span>
            <div class="text-[#333] flex items-center">
                <span>王馨慧(2022030842)</span> <span class="ml-1 text-[#ccc] font-serif">〉</span>
            </div>
        </div>

        <div class="bg-[#f2f5f8] px-4 py-2 flex items-center">
            <div class="w-1 h-4 bg-[#4a90e2] mr-2"></div>
            <span class="text-[#666] font-medium text-sm">请假信息</span>
        </div>
        <div class="px-4 py-4 flex justify-between border-b">
            <span class="text-[#999]">是否补假</span>
            <span class="text-[#333]">是</span>
        </div>

        <div class="bg-[#f2f5f8] px-4 py-2 flex items-center">
            <div class="w-1 h-4 bg-[#4a90e2] mr-2"></div>
            <span class="text-[#666] font-medium text-sm">申请内容</span>
        </div>
        
        <div class="px-4 py-3 space-y-4">
            <div class="flex">
                <span class="text-[#bbb] w-28 flex-shrink-0">审批编号</span>
                <span class="text-[#444]">20260310180313758623</span>
            </div>
            <div class="flex">
                <span class="text-[#bbb] w-28 flex-shrink-0">是否离校</span>
                <span class="text-[#444]">是</span>
            </div>
            <div class="flex">
                <span class="text-[#bbb] w-28 flex-shrink-0">开始时间</span>
                <span id="startTime" class="text-[#444]"></span>
            </div>
            <div class="flex">
                <span class="text-[#bbb] w-28 flex-shrink-0">结束时间</span>
                <span id="endTime" class="text-[#444]"></span>
            </div>
            <div class="flex">
                <span class="text-[#bbb] w-28 flex-shrink-0">时长(天)</span>
                <span class="text-[#444]">0.06</span>
            </div>
            <div class="flex">
                <span class="text-[#bbb] w-28 flex-shrink-0">请假类型</span>
                <span class="text-[#444]">事假</span>
            </div>
            <div class="flex">
                <span class="text-[#bbb] w-28 flex-shrink-0">本人联系电话</span>
                <span class="text-[#444]">13812345678</span> </div>
            <div class="flex">
                <span class="text-[#bbb] w-28 flex-shrink-0">紧急联系人</span>
                <span class="text-[#444]">妈妈</span>
            </div>
            <div class="flex">
                <span class="text-[#bbb] w-28 flex-shrink-0">紧急联系电话</span>
                <span class="text-[#444]">13900008888</span> </div>
            <div class="flex">
                <span class="text-[#bbb] w-28 flex-shrink-0">请假原因</span>
                <span class="text-[#444]">请假去驾校</span>
            </div>
            <div class="flex">
                <span class="text-[#bbb] w-28 flex-shrink-0">请假后去向</span>
                <span class="text-[#444]">驾校</span>
            </div>
            <div class="flex">
                <span class="text-[#bbb] w-28 flex-shrink-0">请假附件</span>
                <span class="text-[#bbb] text-sm">(如病例截图)</span>
            </div>
            
            <div class="pt-2">
                <div class="text-[#bbb] mb-2">手写签名</div>
                <div class="pl-4">
                    <span style="font-family: 'STKaiti', 'KaiTi', '楷体', serif;" class="text-4xl font-bold italic text-[#222] -rotate-3 inline-block">王馨慧</span>
                </div>
            </div>
        </div>
    </div>

    <div class="py-8 text-center">
        <span class="text-[#4a90e2] text-sm">转发审批表单</span>
    </div>

    <script>
        // 自动计算日期脚本
        function updateTime() {
            const now = new Date();
            const year = now.getFullYear();
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const day = String(now.getDate()).padStart(2, '0');
            
            // 拼接日期，保持图片中的具体时间
            document.getElementById('startTime').innerText = `${year}-${month}-${day} 18:02`;
            document.getElementById('endTime').innerText = `${year}-${month}-${day} 19:33`;
        }
        updateTime();
    </script>
</body>
</html>
