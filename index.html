<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>王馨慧的请假</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #f6f8fa;
            font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        /* 还原审批通过印章 */
        .stamp-container {
            position: absolute;
            top: 45px;
            right: 15px;
            z-index: 10;
            pointer-events: none;
        }
        .stamp {
            width: 82px;
            height: 82px;
            border: 3px solid #55c497;
            border-radius: 50%;
            color: #55c497;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            transform: rotate(-15deg);
            background: rgba(255, 255, 255, 0.6);
            position: relative;
        }
        .stamp::after {
            content: "★★";
            font-size: 8px;
            letter-spacing: 2px;
        }
        .stamp-text {
            font-size: 16px;
            line-height: 1.2;
            letter-spacing: 1px;
        }
        /* 虚线效果 */
        .dashed-border {
            border-bottom: 1px dashed #e5e7eb;
        }
    </style>
</head>
<body class="text-[15px]">

    <div class="bg-[#4a90e2] text-white p-3 flex items-center justify-between sticky top-0 z-20">
        <div class="flex items-center">
            <span class="text-2xl mr-2">〈</span>
            <div class="leading-tight">
                <div class="font-medium text-base">王馨慧的请假</div>
                <div class="text-[10px] opacity-70">app.uyiban.com</div>
            </div>
        </div>
        <div class="text-xl font-bold italic">···</div>
    </div>

    <div class="relative bg-white shadow-sm">
        <div class="py-5 text-center border-b">
            <h2 class="text-lg font-normal text-gray-800">王馨慧的请假</h2>
        </div>

        <div class="stamp-container">
            <div class="stamp">
                <div class="stamp-text">审批</div>
                <div class="stamp-text">通过</div>
            </div>
        </div>

        <div class="bg-[#f9fafc] px-4 py-2 flex items-center">
            <div class="w-[3px] h-4 bg-[#4a90e2] mr-2"></div>
            <span class="text-[#666] font-medium">申请人</span>
        </div>
        <div class="px-4 py-4 flex justify-between items-center bg-white border-b">
            <span class="text-[#999]">姓名</span>
            <div class="flex items-center text-[#333]">
                <span>王馨慧(20********)</span>
                <span class="ml-1 text-gray-300 text-xs">〉</span>
            </div>
        </div>

        <div class="bg-[#f9fafc] px-4 py-2 flex items-center mt-1">
            <div class="w-[3px] h-4 bg-[#4a90e2] mr-2"></div>
            <span class="text-[#666] font-medium">请假信息</span>
        </div>
        <div class="px-4 py-4 flex justify-between bg-white border-b">
            <span class="text-[#999]">是否补假</span>
            <span class="text-[#333]">是</span>
        </div>

        <div class="bg-[#f9fafc] px-4 py-2 flex items-center mt-1">
            <div class="w-[3px] h-4 bg-[#4a90e2] mr-2"></div>
            <span class="text-[#666] font-medium">申请内容</span>
        </div>
        
        <div class="bg-white px-4 py-2 pb-6">
            <div class="flex py-2.5">
                <span class="text-[#bbb] w-24 flex-shrink-0">审批编号</span>
                <span class="text-[#444]">20260310180313758623</span>
            </div>
            <div class="flex py-2.5">
                <span class="text-[#bbb] w-24 flex-shrink-0">是否离校</span>
                <span class="text-[#444]">是</span>
            </div>
            <div class="flex py-2.5">
                <span class="text-[#bbb] w-24 flex-shrink-0">开始时间</span>
                <span id="startTime" class="text-[#444]">2026-03-10 18:02</span>
            </div>
            <div class="flex py-2.5">
                <span class="text-[#bbb] w-24 flex-shrink-0">结束时间</span>
                <span id="endTime" class="text-[#444]">2026-03-10 19:33</span>
            </div>
            <div class="flex py-2.5">
                <span class="text-[#bbb] w-24 flex-shrink-0">时长(天)</span>
                <span class="text-[#444]">0.06</span>
            </div>
            <div class="flex py-2.5">
                <span class="text-[#bbb] w-24 flex-shrink-0">请假类型</span>
                <span class="text-[#444]">事假</span>
            </div>
            <div class="flex py-2.5">
                <span class="text-[#bbb] w-24 flex-shrink-0">请假原因</span>
                <span class="text-[#444]">请假去驾校</span>
            </div>
            <div class="flex py-2.5">
                <span class="text-[#bbb] w-24 flex-shrink-0">请假后去向</span>
                <span class="text-[#444]">驾校</span>
            </div>
            <div class="flex py-2.5">
                <span class="text-[#bbb] w-24 flex-shrink-0">请假附件</span>
                <span class="text-[#bbb]">(如病例截图)</span>
            </div>
            <div class="mt-4">
                <div class="text-[#bbb] mb-2">手写签名</div>
                <div class="flex items-center">
                   <span style="font-family: 'STKaiti', 'KaiTi', '楷体', serif;" class="text-4xl font-bold ml-4 -rotate-3">王馨慧</span>
                </div>
            </div>
        </div>
    </div>

    <div class="mt-8 mb-10 text-center">
        <a href="#" class="text-[#4a90e2] text-sm">转发审批表单</a>
    </div>

    <script>
        // 自动更新时间逻辑：设置为打开网页当天的日期
        const now = new Date();
        const y = now.getFullYear();
        const m = String(now.getMonth() + 1).padStart(2, '0');
        const d = String(now.getDate()).padStart(2, '0');
        
        // 这里的具体小时分钟可以根据需要修改
        document.getElementById('startTime').innerText = `${y}-${m}-${d} 18:02`;
        document.getElementById('endTime').innerText = `${y}-${m}-${d} 19:33`;
    </script>
</body>
</html>
